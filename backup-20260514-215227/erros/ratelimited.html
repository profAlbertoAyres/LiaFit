{% extends 'base_auth.html' %}
{% load static %}

{% block title %}Muitas tentativas — LiaFit{% endblock %}

{% block page_content %}
<div class="lia-auth d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center px-4" style="max-width: 480px;">
        <div class="mb-4">
            <i data-lucide="clock-alert" style="width: 64px; height: 64px; color:var(--color-warning)"></i>
        </div>
        <h1 class="h3 mb-3">Muitas tentativas</h1>
        <p class="text-muted mb-4">
            Detectamos várias tentativas em um curto período.
            Por segurança, aguarde alguns minutos antes de tentar novamente.
        </p>
        <a href="{% url 'auth:login' %}" class="btn btn-primary">
            Voltar ao login
        </a>
    </div>
</div>
{% endblock %}
