{% extends "base_app.html" %}

{% block title %}Painel do Superuser{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">Painel Administrativo</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for org in organizations %}
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold">{{ org.company_name }}</h2>
            <p class="text-gray-500 text-sm mt-1">{{ org.slug }}</p>
            <a href="{% url 'tenant:dashboard' org_slug=org.slug %}"
               class="mt-4 inline-block text-indigo-600 hover:text-indigo-800 font-medium">
                Acessar →
            </a>
        </div>
        {% empty %}
        <p class="text-gray-500">Nenhuma organização cadastrada ainda.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
