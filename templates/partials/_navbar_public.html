<header class="lia-navbar">
    <div class="lia-container lia-navbar__inner">
        <div class="lia-navbar__brand">
            <a href="{% url 'website:index' %}" class="lia-navbar__logo">
                <span class="fw-bold fs-4">{{ APP_NAME }}</span>
            </a>
        </div>

        <nav class="lia-navbar__nav">
            <a href="#funcionalidades" class="lia-navbar__link">Funcionalidades</a>
            <a href="#precos" class="lia-navbar__link">Planos</a>
        </nav>
        <div class="lia-navbar__actions d-flex align-items-center gap-4">
            {% if user.is_authenticated %}

                <a href="{% url 'dashboard' %}" class="lia-btn lia-btn--primary">
                    Meu Painel
                </a>

                <a href="{% url 'auth:register' %}" class="lia-btn lia-btn--outline d-none-mobile">
                    Registre sua Empresa
                </a>

            {% else %}

                <a href="{% url 'auth:login' %}" class="lia-btn lia-btn--ghost">Entrar</a>

                <div class="dropdown">
                    <button class="lia-btn lia-btn--primary dropdown-toggle" type="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                        Criar Conta
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                        <li>
                            <a class="dropdown-item py-2" href="{% url 'auth:client_register' %}">
                                <strong>Sou Cliente</strong><br>
                                <small class="text-muted">Quero encontrar serviços</small>
                            </a>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <a class="dropdown-item py-2" href="{% url 'auth:register' %}">
                                <strong>Sou Empresa / Profissional</strong><br>
                                <small class="text-muted">Quero oferecer meus serviços</small>
                            </a>
                        </li>
                    </ul>
                </div>

            {% endif %}
        </div>


    </div>
</header>
