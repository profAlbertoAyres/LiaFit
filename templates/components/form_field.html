<div class="{{ col|default:'col-md-12' }} {{ extra_class|default:'' }} mb-3">

    <label for="{{ field.id_for_label }}" class="lia-label">
        {{ field.label }}
        {% if field.field.required %}
            <span class="text-danger">*</span>
        {% endif %}
    </label>

    <!-- Verifica se a variável "icon" foi passada no include -->
    {% if icon %}
        <div class="position-relative lia-input-has-icon">
            <!-- Ícone flutuante dentro do input -->
            <div class="position-absolute d-flex align-items-center justify-content-center text-muted"
                 style="left: 12px; top: 0; bottom: 0; pointer-events: none;">
                <i data-lucide="{{ icon }}" style="width: 18px; height: 18px;"></i>
            </div>

            <!-- O widget do Django entra aqui -->
            {{ field }}
        </div>

        <!-- Pequeno truque de CSS para o texto não ficar em cima do ícone -->
        <style>
            .lia-input-has-icon .lia-form-control {
                padding-left: 2.5rem !important;
            }
        </style>

    {% else %}
        {{ field }}
    {% endif %}

    {% if field.help_text %}
        <div class="lia-form-help mt-1">
            {{ field.help_text }}
        </div>
    {% endif %}

    {% if field.errors %}
        <div class="text-danger small mt-1">
            {{ field.errors|striptags }}
        </div>
    {% endif %}
</div>
