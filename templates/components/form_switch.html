<div class="{{ col|default:'col-12' }} {{ extra_class|default:'' }} mb-3">
    
    <div class="form-check form-switch d-flex align-items-center gap-2">
        {{ field }}
        
        <label for="{{ field.id_for_label }}" class="form-check-label lia-label mb-0 cursor-pointer" style="margin-bottom: 0;">
            {{ field.label }}
            {% if field.field.required %}
                <span class="text-danger">*</span>
            {% endif %}
        </label>
    </div>

    {% if field.help_text %}
        <div class="lia-form-help mt-1 ms-5">
            {{ field.help_text }}
        </div>
    {% endif %}

    {% if field.errors %}
        <div class="text-danger small mt-1 ms-5">
            {{ field.errors|striptags }}
        </div>
    {% endif %}
</div>
