<div class="{{ col|default:'col-12' }} {{ extra_class|default:'' }} mb-3">
    
    <div class="form-check form-switch d-flex align-items-center gap-2">
        <!-- O widget do Django (precisa ter a classe form-check-input no form.py) -->
        {{ field }}
        
        <label for="{{ field.id_for_label }}" class="form-check-label fw-semibold text-dark mb-0 cursor-pointer">
            {{ field.label }}
            {% if field.field.required %}
                <span class="text-danger">*</span>
            {% endif %}
        </label>
    </div>

    {% if field.help_text %}
        <div class="form-text small text-muted mt-1 ms-5">
            {{ field.help_text }}
        </div>
    {% endif %}

    {% if field.errors %}
        <div class="invalid-feedback d-block ms-5">
            {{ field.errors|striptags }}
        </div>
    {% endif %}
</div>
