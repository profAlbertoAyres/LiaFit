<div class="{{ col|default:'col-md-12' }} {{ extra_class|default:'' }} mb-3">

    <label for="{{ field.id_for_label }}" class="form-label fw-semibold text-dark small">
        {{ field.label }}
        {% if field.field.required %}
            <span class="text-danger">*</span>
        {% endif %}
    </label>

    <div class="input-group">
        <!-- Ícone do calendário do Lucide acoplado ao input -->
        <span class="input-group-text bg-light text-muted border-end-0">
            <i data-lucide="calendar" style="width: 18px; height: 18px;"></i>
        </span>
        <!-- O widget do Django (precisa ter as classes form-control e flatpickr-date no form.py) -->
        {{ field }}
    </div>

    {% if field.help_text %}
        <div class="form-text small text-muted mt-1">
            {{ field.help_text }}
        </div>
    {% endif %}

    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {{ field.errors|striptags }}
        </div>
    {% endif %}
</div>
