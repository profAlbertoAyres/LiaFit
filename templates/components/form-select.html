<div class="{{ col|default:'col-md-12' }} {{ extra_class|default:'' }} mb-3">

    <label for="{{ field.id_for_label }}" class="form-label fw-semibold text-dark small">
        {{ field.label }}
        {% if field.field.required %}
            <span class="text-danger">*</span>
        {% endif %}
    </label>

    <!-- O widget do Django entra aqui (precisa ter a classe form-select no form.py) -->
    {{ field }}

    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {{ field.errors|striptags }}
        </div>
    {% endif %}
</div>
