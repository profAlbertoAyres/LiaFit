<div class="modal fade lia-modal lia-modal--sm lia-modal--danger"
     id="confirmRevoke-{{ membership.pk }}-{{ role.pk }}"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="lia-modal__header">
                <h2 class="lia-modal__title">
                    <i data-lucide="alert-triangle"></i>
                    Revogar papel
                </h2>
                <button type="button"
                        class="lia-modal__close"
                        data-bs-dismiss="modal"
                        aria-label="Fechar">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="lia-modal__body">
                <p>
                    Tem certeza que deseja revogar o papel
                    <strong>{{ role.name }}</strong> deste membro?
                </p>
                <p class="lia-modal__hint">
                    <i data-lucide="info"></i>
                    <span>Você poderá <strong>desfazer</strong> esta ação por 10 segundos.</span>
                </p>
            </div>

            <div class="lia-modal__footer">
                <button type="button"
                        class="lia-btn lia-btn--ghost"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="button"
                        class="lia-btn lia-btn--danger"
                        data-bs-dismiss="modal"
                        hx-post="{% url 'tenant:member_role_revoke' org_slug=request.context.organization.slug pk=membership.pk role_id=role.pk %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                        hx-target="#role-card-{{ membership.pk }}-{{ role.pk }}"
                        hx-swap="outerHTML">
                    <i data-lucide="x"></i>
                    <span>Revogar</span>
                </button>
            </div>

        </div>
    </div>
</div>
