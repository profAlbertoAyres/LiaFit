<div class="{{ col|default:'col-12' }} {{ extra_class|default:'' }} mb-3">

    <label for="{{ field.id_for_label }}" class="form-label fw-semibold text-dark small">
        {{ field.label }}
        {% if field.field.required %}
            <span class="text-danger">*</span>
        {% endif %}
    </label>

    {{ field }}

    {% if field.help_text %}
        <div class="form-text small text-muted mt-1">
            {{ field.help_text }}
        </div>
    {% endif %}

    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {{ field.errors|striptags }}
        </div>
    {% endif %}
</div>
