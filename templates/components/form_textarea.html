<div class="{{ col|default:'col-12' }} {{ extra_class|default:'' }} mb-3">
    <label for="{{ field.id_for_label }}" class="lia-label">
        {{ field.label }}
        {% if field.field.required %}
            <span class="text-danger">*</span>
        {% endif %}
    </label>

    {{ field }}

    {% if field.help_text %}
        <div class="lia-form-help mt-1">
            {{ field.help_text }}
        </div>
    {% endif %}

    {% if field.errors %}
        <div class="text-danger small mt-1">
            {{ field.errors|striptags }}
        </div>
    {% endif %}
</div>
