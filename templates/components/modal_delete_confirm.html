<!-- templates/components/modal_delete_confirm.html (refatorado) -->
<div class="modal fade lia-modal lia-modal--sm lia-modal--danger"
     id="{{ modal_id|default:'modalDelete' }}"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="lia-modal__header">
                <h2 class="lia-modal__title">
                    <i data-lucide="alert-triangle"></i>
                    {{ title|default:"Confirmar exclusão" }}
                </h2>
                <button type="button"
                        class="lia-modal__close"
                        data-bs-dismiss="modal"
                        aria-label="Fechar">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="lia-modal__body">
                {{ message|default:"Esta ação não pode ser desfeita. Deseja continuar?" }}
            </div>

            <div class="lia-modal__footer">
                <button type="button"
                        class="lia-btn lia-btn--ghost"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="submit"
                        form="{{ form_id }}"
                        class="lia-btn lia-btn--primary lia-btn--danger">
                    Excluir
                </button>
            </div>

        </div>
    </div>
</div>
