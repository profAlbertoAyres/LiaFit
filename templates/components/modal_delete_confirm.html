<div class="modal fade" id="deleteModal{{ id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: var(--radius-lg); background-color: var(--color-bg);">
            <form action="{{ url }}" method="post">
                {% csrf_token %}

                <div class="modal-header border-bottom-0 pb-0">
                    <div class="d-flex align-items-center gap-2 text-danger">
                        <i data-lucide="alert-triangle"></i>
                        <h5 class="modal-title fw-bold" style="color: var(--color-text-muted);">Confirmar Exclusão</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body pt-4">
                    <p class="mb-4" style="color: var(--color-text-muted);">Tem certeza que deseja excluir <strong>{{ name }}</strong>? Esta ação não pode ser desfeita.</p>

                    <div class="mb-3 p-3 rounded-3" style="background-color: var(--color-focus-ring); border: 1px solid var(--color-border);">
                        <label for="password_confirm_{{ id }}" class="lia-label">Digite sua senha para confirmar:</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i data-lucide="lock" style="width: 16px; height: 16px; color: var(--color-text-muted);"></i>
                            </span>
                            <input type="password" name="password_confirm" id="password_confirm_{{ id }}" class="lia-form-control border-start-0" required placeholder="Sua senha de acesso">
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="lia-btn lia-btn--ghost" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="lia-btn lia-btn--danger">
                        <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                        Confirmar Exclusão
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
