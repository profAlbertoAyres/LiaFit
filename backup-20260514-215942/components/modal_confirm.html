<!-- Modal de Confirmação Simples (sem senha) -->
{# === MODAL DE CONFIRMAÇÃO (padrão modal_confirm.html) === #}
<div class="modal fade"
     id="confirmRevoke-{{ membership.pk }}-{{ role.pk }}"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: transparent; border: none; box-shadow: none;">

            <div class="lia-card" style="box-shadow: var(--shadow-lg);">

                <!-- HEADER -->
                <div class="d-flex align-items-center justify-content-between p-3"
                     style="padding-bottom: var(--space-4);">
                    <div class="d-flex align-items-center gap-2"
                         style="color: var(--color-danger);">
                        <i data-lucide="alert-triangle" class="lucide"></i>
                        <h5 class="fw-bold"
                            style="font-size: var(--font-size-lg); margin: 0;">
                            Revogar papel
                        </h5>
                    </div>
                    <button type="button"
                            class="lia-btn lia-btn--icon lia-btn--ghost lia-btn--sm"
                            data-bs-dismiss="modal"
                            aria-label="Fechar"
                            style="color: var(--color-text-muted);">
                        <i data-lucide="x" class="lucide"></i>
                    </button>
                </div>

                <div class="p-4">
                    <p class="text-secondary" style="margin-bottom: var(--space-3);">
                        Tem certeza que deseja revogar o papel
                        <strong>{{ role.name }}</strong> deste membro?
                    </p>
                    <p class="lia-text-xs text-muted d-flex align-items-center gap-1"
                       style="margin-bottom: 0;">
                        <i data-lucide="info" class="lucide-xs"></i>
                        <span>Você poderá <strong>desfazer</strong> esta ação por 10 segundos.</span>
                    </p>
                </div>

                <!-- FOOTER -->
                <div class="lia-card__footer">
                    <button type="button"
                            class="lia-btn lia-btn--ghost"
                            data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="button"
                            class="lia-btn lia-btn--danger"
                            data-bs-dismiss="modal"
                            hx-post="{% url 'tenant:member_role_revoke' org_slug=request.context.organization.slug pk=membership.pk role_id=role.pk %}"
                            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                            hx-target="#role-card-{{ membership.pk }}-{{ role.pk }}"
                            hx-swap="outerHTML">
                        <i data-lucide="x" class="lucide-sm"></i>
                        <span>Revogar</span>
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
