<form method="post" novalidate>
    {% csrf_token %}

    {{ form.email.label_tag }}
    {{ form.email }}
    {% if form.email.errors %}
        <div class="invalid-feedback d-block">
            {{ form.email.errors.0 }}
        </div>
    {% endif %}

    <button type="submit" class="btn btn-primary">
        Enviar link de redefinição
    </button>
</form>
